name: Swarm CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

# La VM que j'utilise est en ARM64, donc je build pour cette architecture.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64, linux/arm64
          tags: |
            zastial/docker-swarm:latest
            zastial/docker-swarm:${{ github.sha }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SWARM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.SWARM_IP }} >> ~/.ssh/known_hosts

      - name: Create Docker context
        run: |
          docker context create swarm \
            --docker "host=ssh://devopsci@${{ secrets.SWARM_IP }}"
          docker context use swarm

      - name: Deploy to Swarm
        run: |
          docker service update \
            --image zastial/docker-swarm:${{ github.sha }} \
            docker-swarm-api